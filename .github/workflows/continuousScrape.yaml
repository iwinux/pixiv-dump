name: Scrape All

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        options: >-
          --health-cmd "curl -f http://localhost:8191/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Create fresh db/pixiv.db
        run: |
          mkdir -p db
          bunx prisma migrate dev

      - name: Set up DB
        run: bun run migrate

      - name: Scrape
        run: bun src/index.ts --timeout=300000 --max-articles=5
        env:
          FLARESOLVERR_URL: http://localhost:8191/v1

      - name: Upload DB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: db
          path: db/*

      - name: Check if total.txt exists
        id: check_file
        run: |
          if [[ -f total.txt ]]; then
            echo "::set-output name=completed::true"
          else
            echo "::set-output name=completed::false"
          fi

      - name: Upload total.txt if it exists
        if: steps.check_file.outputs.completed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: total
          path: total.txt

  release:
    runs-on: ubuntu-latest
    needs: scrape
    # if: ${{ needs.scrape.outputs.completed == 'true' }}
    steps:
      - name: Get Current Date
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d')"

      - name: Download DB
        uses: actions/download-artifact@v4
        with:
          name: db
          path: db
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: Download total.txt
        uses: actions/download-artifact@v4
        with:
          name: total
          path: total
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
        continue-on-error: true

      - name: Read Total Count from total.txt
        id: read_total
        run: |
          if [[ -f total/total.txt ]]; then
            TOTAL=$(cat total/total.txt)
          else
            TOTAL=''
          fi
          echo "Total: $TOTAL"
          echo "::set-output name=total::$TOTAL"

      - name: Set release body
        id: set_body
        run: |
          if [[ "${{ steps.read_total.outputs.total }}" != "" ]]; then
            echo "::set-output name=body::Total entries in DB: ${{ steps.read_total.outputs.total }}"
          else
            echo "::set-output name=body::Scraping of articles is still in progress."
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            db/pixiv.db
          tag_name: ${{ steps.date.outputs.date }}
          # prerelease: ${{ steps.read_total.outputs.total == '' }}
          body: ${{ steps.set_body.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
